<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modded by - Dilmurod</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body {
      padding: 20px;
      position: relative;
    }

    /* 🌸 Gullar */
    .flower {
      position: fixed;
      top: -10%;
      font-size: 24px;
      opacity: 0.8;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }

    .link {
      display: block;
      background: #00ffd5;
      color: #000;
      margin: 12px auto;
      padding: 16px;
      width: 95%;
      max-width: 420px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(0,255,0,.7);
      transform: scale(1);
      z-index: 1;
      position: relative;
    }

    .link:hover {
      background: #1aff1a;
      transform: scale(1.08);
    }

    .link.disabled {
      background: #777;
      pointer-events: none;
      opacity: .6;
    }

    .link.visited {
      background: #1aff1a;
    }

    .link.visited::after {
      content: "✅ Bajarildi";
      display: block;
      font-size: 14px;
      margin-top: 4px;
      color: #003300;
    }

    .link.finalBlue {
      background: #2196f3;
      color: #fff;
      box-shadow: 0 0 12px rgba(33,150,243,.7);
    }

    .countdown {
      font-size: 14px;
      margin-top: 5px;
      color: yellow;
    }
  </style>
</head>
<body>

  <h2>🔑 Faylni Qulfdan ochish uchun kanallarga obuna bo'l</h2>
  <p>Sahifani yangilama</p>

  <a class="link"
     href="https://modderff.github.io/Fayllar/Modder-FF-Video.html"
     target="_blank"
     data-text="1) Shorts (Like + Comment)"
     onclick="visit(event,0)">
  </a>

  <a class="link disabled"
     href="https://www.youtube.com/channel/UCdlOZ5UZRq1Y3HiuDdgi3Ag"
     target="_blank"
     data-text="2) YouTube FF (Obuna)"
     onclick="visit(event,1)">
  </a>

  <a class="link disabled"
     href="https://modderff.github.io/Fayllar/King-Pubg-Video.html"
     target="_blank"
     data-text="3) Shorts (Like + Comment)"
     onclick="visit(event,2)">
  </a>

  <a class="link disabled"
     href="https://www.youtube.com/channel/UC9E0sZ3-qmpLqD2dH6CLAVA"
     target="_blank"
     data-text="4) YouTube PG (Obuna)"
     onclick="visit(event,3)">
  </a>

  <a class="link disabled"
     href="https://modderff.github.io/Fayllar/Telegram-Link.html"
     target="_blank"
     data-text="5) Telegram (Join)"
     onclick="visit(event,4)">
  </a>

  <a class="link disabled"
     href="https://www.instagram.com/modderff"
     target="_blank"
     data-text="6) Instagram (Follow)"
     onclick="visit(event,5)">
  </a>

  <!-- 🔓 Yuklash -->
<a href="https://www.dropbox.com/scl/fi/34mx7e7woorhq2wr9vp0m/Free-Fire-120-FPS-dilmurod.zip?rlkey=0tsez61iwqfx4v93h71o7sevg&st=41jegz3l&dl=1" 
     target="_blank"
     class="link finalBlue"
     id="finalBtn"
     style="display:none;">
     🔓 Qulf ochildi yuklash mumkin
  </a>

  <!-- 📢 Telegram -->
  <a href="https://t.me/Maxfiy_havolabot?start=122"
     target="_blank"
     class="link finalBlue"
     id="telegramBtn"
     style="display:none;">
     📢 Telegram orqali yuklash
  </a>

  <script>

    // 🌸 Gullar
    function createFlowers() {

      const flower = document.createElement("div");

      flower.classList.add("flower");

      flower.textContent = "🌸";

      flower.style.left =
        Math.random() * 100 + "%";

      flower.style.animationDuration =
        (Math.random() * 5 + 5) + "s";

      document.body.appendChild(flower);

      setTimeout(() => {
        flower.remove();
      }, 10000);

      setTimeout(createFlowers, 800);
    }

    createFlowers();

    const links =
      document.querySelectorAll(".link:not(.finalBlue)");

    links.forEach(l => {
      l.textContent = l.dataset.text;
    });

    let visited =
      [false,false,false,false,false,false];

    let current = 0;

    function visit(event, i){

      if(i !== current){
        event.preventDefault();
        return;
      }

      let btn = links[i];

      if(btn.classList.contains("waiting")){
        event.preventDefault();
        return;
      }

      btn.classList.add("waiting");

      let timer = 15;

      const countdown =
        document.createElement("div");

      countdown.className = "countdown";

      countdown.innerText =
        "⏰ " + timer + " Soniya kuting";

      btn.appendChild(countdown);

      const interval = setInterval(() => {

        timer--;

        countdown.innerText =
          "⏰ " + timer + " Soniya kuting";

        if(timer <= 0){

          clearInterval(interval);

          countdown.remove();

          visited[i] = true;

          btn.classList.add("visited");

          current++;

          if(links[current]){
            links[current]
              .classList.remove("disabled");
          }

          if(visited.every(v => v)){

            document.getElementById("finalBtn")
              .style.display = "block";

            document.getElementById("telegramBtn")
              .style.display = "block";
          }
        }

      },1000);
    }

  </script>

</body>
</html>
