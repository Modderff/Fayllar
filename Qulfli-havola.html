<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish uchun obuna</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden; /* Sayfada bo'sh joydan tashqariga chiqmaslik */
    }

    /* Gullarni animatsiya qilish uchun */
    .flower {
      position: absolute;
      font-size: 24px;
      opacity: 0;
      animation: fall 10s infinite ease-in-out;
      pointer-events: none; /* Gullarni bosmaslik uchun */
    }

    /* Animatsiya - gullar pastga tushadi */
    @keyframes fall {
      0% {
        top: -10%;
        left: calc(100% * random());
        opacity: 1;
      }
      100% {
        top: 100%;
        opacity: 0;
      }
    }

    .link {
      display: block;
      background: #00ffd5;
      color: #000;
      margin: 12px auto;
      padding: 16px;
      width: 95%;
      max-width: 420px;
      border-radius: 50px; /* Dumaloq burchaklar */
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.3s ease; /* Hover effektlari uchun sishasinon effekt */
      box-shadow: 0 0 12px rgba(0,255,0,.7);
      transform: scale(1); /* Bosilganda kattalashishi uchun */
    }

    /* Hover va aktiv holat uchun effektlar */
    .link:hover {
      background: #1aff1a;
      color: #000;
      transform: scale(1.1); /* Tugma ustiga kursorni olib borilganda kengayishi */
    }

    .link.disabled {
      background: #777;
      pointer-events: none;
      opacity: .6;
    }

    .link.visited {
      background: #1aff1a;
      box-shadow: 0 0 12px rgba(0, 255, 0, .7);
    }

    .link.visited::after {
      content: "Bajarildi";
      display: block;
      font-size: 14px;
      margin-top: 4px;
      color: #003300;
    }

    /* Oxirgi tugma ham bir xil, faqat moviy */
    .link.finalBlue {
      background: #2196f3;
      color: #fff;
      box-shadow: 0 0 12px rgba(33,150,243,.7);
    }

    .link.finalBlue::after {
      content: "";
    }
  </style>
</head>
<body>

  <h2>🔒 Havolani Qulfdan chiqarish uchun kanallarga obuna bo‘ling</h2>
  <p>Tartib bilan bajaring. Sahifani yangilamang.</p>

  <a class="link" href="https://youtu.be/X5R9mh0bgcY?si=5IKOUI0BA4WhGNcX" target="_blank" data-text="+1) Video (Like + Comment)" onclick="visit(0)"></a>
  <a class="link disabled" href="https://youtube.com/@modderf" target="_blank" data-text="1) YouTube FF (Obuna)" onclick="visit(1)"></a>
  <a class="link disabled" href="https://youtube.com/shorts/P_Dx4jl1WYY?si=BkbW1YoaWVHHMT82" target="_blank" data-text="+2) Video (Like + Comment)" onclick="visit(2)"></a>
  <a class="link disabled" href="https://youtube.com/@kingpubglive" target="_blank" data-text="2) YouTube PG (Obuna)" onclick="visit(3)"></a>
 // <a class="link disabled" href="https://www.instagram.com/modderff" target="_blank" data-text="+3) Instagram (Follow)" onclick="visit(4)"></a>  
  <a class="link disabled" href="https://t.me/+RZiLoLoeBWMzZmNi" target="_blank" data-text="+3) Telegram (Join)" onclick="visit(3)"></a>

  <!-- Oxirgi tugma endi alohida qora bloksiz -->
  <a href="https://modderff.github.io/Fayllar/Maxfiy-havola.html" 
     target="_blank" 
     class="link finalBlue"
     id="finalBtn"
     style="display:none;">
     🔓 Qulf ochildi kiring
  </a>

  <script>
    // 🌸 Gullarni qo'shish uchun
    function createFlowers() {
      const flower = document.createElement("div");
      flower.classList.add("flower");
      flower.textContent = "🌸";
      document.body.appendChild(flower);

      // Har bir gul uchun tasodifiy joylashtirish
      flower.style.left = Math.random() * 100 + "%";
      
      // Har safar yangi gul qo'shiladi
      setTimeout(createFlowers, Math.random() * 3000 + 1000); // Har bir 1-3 sekundda yangi gul paydo bo'ladi
    }

    createFlowers(); // Gullarni yaratishni boshlash

    const links = document.querySelectorAll(".link:not(.finalBlue)");
    links.forEach(l => l.textContent = l.dataset.text);

    let visited = [false,false,false,false,false,false];
    let current = 0;

    links.forEach((btn,i)=>{
      if(i !== 0) btn.classList.add("disabled");
    });

    function visit(i){
      if(i !== current) return;

      visited[i] = true;
      links[i].classList.add("visited");

      current++;
      if(links[current]) links[current].classList.remove("disabled");

      if(visited.every(v => v)){
        document.getElementById("finalBtn").style.display = "block";
      }
    }
  </script>

</body>
</html>
