<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilova kodi</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: auto; /* Saytni surish imkonini berish */
    }

    .link {
      display: block;
      background: #00ffd5;
      color: #000;
      margin: 12px auto;
      padding: 16px;
      width: 95%;
      max-width: 420px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .link.disabled {
      background: #777;
      pointer-events: none;
      opacity: .6;
    }

    .link.visited {
      background: #1aff1a;
      box-shadow: 0 0 12px rgba(0, 255, 0, .7);
    }

    .link.visited::after {
      content: "Bajarildi";
      display: block;
      font-size: 14px;
      margin-top: 4px;
      color: #003300;
    }

    #codeBox {
      display: none;
      margin-top: 30px;
      background: #111;
      padding: 20px;
      border-radius: 14px;
      border: 2px dashed #00ffd5;
    }

    .code {
      font-size: 28px;
      color: #00ffd5;
      letter-spacing: 4px;
      cursor: pointer;
    }

    .code.pending {
      font-size: 16px;
      letter-spacing: 1px;
      color: #aaa;
      cursor: default;
    }

    .code.err {
      font-size: 15px;
      letter-spacing: 0.5px;
      color: #ff5c5c;
      cursor: default;
    }

    .copyHint {
      margin-top: 8px;
      font-size: 13px;
      color: #aaa;
    }

    #timer {
      margin-top: 20px;
      font-size: 20px;
      color: #ff9900;
    }

    /* Animatsiya uchun .flower classi */
    .flower {
      position: absolute;
      font-size: 24px;
      opacity: 0;
      animation: fall 10s infinite ease-in-out;
      pointer-events: none; /* Gullarni bosmaslik uchun */
    }

    /* Animatsiya - gullar pastga tushadi */
    @keyframes fall {
      0% {
        top: -10%;
        left: calc(100% * random());
        opacity: 1;
      }
      100% {
        top: 100%;
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<h2>🔒 Kodni olish uchun kanallarga obuna bo‘l</h2>
<p>Tartib bilan bajar. Sahifani yangilama.</p>

  <a class="link" href="https://youtu.be/5Cjt8rhD6Xc?si=Hi2ZllEosgjErMls" target="_blank" data-text="1) Shorts (Like + Comment)" onclick="visit(0)"></a>
  <a class="link disabled" href="https://www.youtube.com/channel/UCdlOZ5UZRq1Y3HiuDdgi3Ag" target="_blank" data-text="2) YouTube FF (Obuna)" onclick="visit(1)"></a>
  <a class="link disabled" href="https://youtu.be/LLLLz-mQPpM?si=DYhQ_LeqN7Wp7WOS" target="_blank" data-text="3) Shorts (Like + Comment)" onclick="visit(2)"></a>
  <a class="link disabled" href="https://www.youtube.com/channel/UC9E0sZ3-qmpLqD2dH6CLAVA" target="_blank" data-text="4) YouTube PG (Obuna)" onclick="visit(3)"></a>
  <a class="link disabled" href="https://t.me/+RZiLoLoeBWMzZmNi" target="_blank" data-text="5) Telegram (Join)" onclick="visit(4)"></a>


<div id="codeBox">
  <h3>🎉 Tabriklaymiz!</h3>
  <div class="code" id="codeText">—</div>
  <div class="copyHint" id="copyHint">Bosib nusxala</div>
  <div id="timer"></div> <!-- Taymerni ko'rsatish uchun joy -->
</div>

<script>
// ====== FIREBASE SOZLAMALARI ======
const firebaseConfig = {
  apiKey: "AIzaSyBagTt_GKxzKzUiIj8dIVZu-gPM9-EHDUo",
  authDomain: "planning-with-ai-7f474.firebaseapp.com",
  projectId: "planning-with-ai-7f474",
  storageBucket: "planning-with-ai-7f474.firebasestorage.app",
  messagingSenderId: "730296215902",
  appId: "1:730296215902:web:ef0487d2ac628724e947cf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Bu sahifa uchun ALOHIDA kolleksiya nomi — eski test kalitlaringizga
// (Kalitni olish sahifasidagi 4 talik "keys" kolleksiyasiga) tegmaydi.
const KEYS_COLLECTION = "codes100";
const LOCAL_CLAIM_KEY = "codes100_my_claim";

function getLocalClaim() {
  try {
    const raw = localStorage.getItem(LOCAL_CLAIM_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function saveLocalClaim(code) {
  try { localStorage.setItem(LOCAL_CLAIM_KEY, code); } catch (e) {}
}

function getLocalClaimSimple() {
  try { return localStorage.getItem(LOCAL_CLAIM_KEY); } catch (e) { return null; }
}

const codeTextEl = document.getElementById("codeText");
const copyHintEl = document.getElementById("copyHint");

function showCodeState(state, value) {
  codeTextEl.classList.remove("pending", "err");
  if (state === "pending") {
    codeTextEl.classList.add("pending");
    codeTextEl.textContent = "Kalit ajratilmoqda…";
    copyHintEl.textContent = "";
  } else if (state === "empty") {
    codeTextEl.classList.add("err");
    codeTextEl.textContent = "Afsuski, kalitlar tugadi";
    copyHintEl.textContent = "Keyinroq qayta urinib ko'ring";
  } else if (state === "error") {
    codeTextEl.classList.add("err");
    codeTextEl.textContent = "Ulanishda xatolik yuz berdi";
    copyHintEl.textContent = "Sahifani yangilab ko'ring";
  } else if (state === "ready") {
    codeTextEl.textContent = value;
    copyHintEl.textContent = "Bosib nusxala";
  }
}

// Barcha 5 ta havola bajarilgach chaqiriladi: bitta, shu foydalanuvchiga
// tegishli kalitni Firestore'dan oladi (agar avval olingan bo'lsa, o'shani
// qaytaradi — qayta yangi kalit berilmaydi).
async function claimMyCode() {
  showCodeState("pending");

  const existing = getLocalClaimSimple();
  if (existing) {
    showCodeState("ready", existing);
    return;
  }

  try {
    const keysRef = db.collection(KEYS_COLLECTION);

    const candidateSnap = await keysRef.where("status", "==", "available").limit(1).get();
    if (candidateSnap.empty) {
      showCodeState("empty");
      return;
    }
    const candidateRef = candidateSnap.docs[0].ref;

    const claimedCode = await db.runTransaction(async (tx) => {
      const doc = await tx.get(candidateRef);
      if (!doc.exists || doc.data().status !== "available") {
        return null; // boshqa foydalanuvchi bir zumda oldi — qayta urinamiz
      }
      tx.update(candidateRef, {
        status: "used",
        claimedBy: "user-" + Math.random().toString(36).slice(2, 10)
      });
      return doc.id;
    });

    if (!claimedCode) {
      return claimMyCode(); // raqobat holati — bitta marta qayta urinish
    }

    saveLocalClaim(claimedCode);
    showCodeState("ready", claimedCode);
  } catch (e) {
    console.error(e);
    showCodeState("error");
  }
}

// 🌸 Gullarni qo'shish uchun
function createFlowers() {
  const flower = document.createElement("div");
  flower.classList.add("flower");
  flower.textContent = "❄️";
  document.body.appendChild(flower);

  // Har bir gul uchun tasodifiy joylashtirish
  flower.style.left = Math.random() * 100 + "%";
  
  // Har safar yangi gul qo'shiladi
  setTimeout(createFlowers, Math.random() * 3000 + 1000); // Har bir 1-3 sekundda yangi gul paydo bo'ladi
}

createFlowers(); // Gullarni yaratishni boshlash

// 🔄 REFRESH BO‘LSA — HAMMASI QAYTA BOSHLANMASIN
const PAGE_KEY = "qulfi_" + location.pathname;
const savedCountdownDate = localStorage.getItem(PAGE_KEY);

let countdownDate;

if (savedCountdownDate) {
  countdownDate = parseInt(savedCountdownDate, 10);  // Agar oldin saqlangan sana mavjud bo'lsa, uni olish
} else {
  countdownDate = new Date().getTime() + 7 * 24 * 60 * 60 * 1000;  // 7 kunlik taymerni o'rnatish
  localStorage.setItem(PAGE_KEY, countdownDate);  // Yangi sanani saqlash
}

// ================================

const links = document.querySelectorAll(".link");
links.forEach(l => l.textContent = l.dataset.text);

let visited = [false, false, false, false, false];
let current = 0;

links.forEach((btn, i) => {
  if (i !== 0) btn.classList.add("disabled");
});

function visit(i) {
  if (i !== current) return;

  visited[i] = true;
  links[i].classList.add("visited");

  current++;
  if (links[current]) links[current].classList.remove("disabled");

  if (visited.every(v => v)) {
    document.getElementById("codeBox").style.display = "block";
    claimMyCode();  // Firestore'dan shaxsiy kalitni olish
    startTimer(); // Taymerni ishga tushirish
  }
}

// Agar foydalanuvchi avval kalit olgan bo'lsa (sahifani qayta ochsa),
// hammasi allaqachon bajarilgan deb ko'rsatib, kalitini darhol chiqaramiz.
(function restoreIfAlreadyClaimed() {
  const existing = getLocalClaimSimple();
  if (existing) {
    visited = [true, true, true, true, true];
    links.forEach(l => { l.classList.remove("disabled"); l.classList.add("visited"); });
    document.getElementById("codeBox").style.display = "block";
    showCodeState("ready", existing);
  }
})();

// 📋 Nusxalash
codeTextEl.onclick = function () {
  if (codeTextEl.classList.contains("pending") || codeTextEl.classList.contains("err")) return;
  navigator.clipboard.writeText(this.textContent);
  copyHintEl.textContent = "Nusxa olindi!";
};

// ================================
// 7 kunlik taymer

function startTimer() {
  const timerInterval = setInterval(function () {
    const now = new Date().getTime();
    const distance = countdownDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    // Taymerni ekranga chiqarish
    document.getElementById("timer").innerHTML = `${days} Kun ${hours} Soat ${minutes} Daqiqa ${seconds} Sekund`;

    // Taymer tugaganida
    if (distance < 0) {
      clearInterval(timerInterval);
      document.getElementById("timer").innerHTML = "Taymer tugadi!";
      
      // Yangi taymerni boshlash (7 kunlik yangi taymer)
      countdownDate = new Date().getTime() + 7 * 24 * 60 * 60 * 1000;  // 7 kunlik taymer
      localStorage.setItem(PAGE_KEY, countdownDate);  // Yangi sanani saqlash
      startTimer(); // Yangi taymerni ishga tushirish
    }
  }, 1000);
}

if (getLocalClaimSimple()) {
  startTimer();
}
</script>

</body>
</html>
